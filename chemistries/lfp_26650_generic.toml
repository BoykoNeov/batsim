# Generic LFP 26650 cell parameters.
#
# Phase 0 consumes the [meta], [cell], [ocv], [r0], and [[rc]] sections. The
# [thermal], [aging], and [safety] sections are declared here for
# forward-compatibility and are ignored by the current loader (they are wired in
# during Phases 2–3). Every physical constant carries a provenance note per the
# project rule: no unlabeled numbers.

[meta]
id         = "lfp_26650_generic"
name       = "Generic LFP 26650"
provenance = "OCV and capacity fitted to PyBaMM Prada2013 (LFP) via tools/reference/fit_ocv.py; R0, RC, and the aging/safety sections remain order-of-magnitude placeholders (TODO: fit)."

[cell]
# provenance: usable capacity between the Prada2013 stoichiometry limits
# (Q_n*(x_max-x_min)), computed by tools/reference/fit_ocv.py. Setting this to the
# reference's usable capacity makes batsim's coulomb-counted SOC track PyBaMM's
# stoichiometry SOC under constant current, which is what the golden CC test relies on.
capacity_ah     = 2.303451
v_max           = 3.65     # provenance: standard LFP charge cutoff (protection limit; Prada2013 OCV tops out at 3.60 V)
v_min           = 2.00     # provenance: standard LFP discharge cutoff (matches Prada2013 lower cut-off)
max_charge_c    = 1.0      # provenance: typical LFP continuous charge rating
max_discharge_c = 3.0      # provenance: typical LFP continuous discharge rating
t_charge_min_k  = 273.15   # provenance: charge inhibit below 0 degC (Li plating guard)
t_max_k         = 333.15   # provenance: 60 degC operating ceiling (datasheet class)

# Monotone OCV(soc); linear interpolation, clamped at the ends. SOC here is the
# stoichiometry-window state of charge (1 = fully charged). Grid is dense at the
# steep, convex knees and coarse across the flat plateau.
# provenance: thermodynamic cell OCV = U_p(y(soc)) - U_n(x(soc)) of the PyBaMM
# Prada2013 parameter set, emitted by tools/reference/fit_ocv.py (pybamm 26.6.2.0).
# Max piecewise-linear representation error vs the continuous OCV ~25 mV, confined
# to the sub-1% bottom knee; a few mV across the plateau.
[ocv]
soc   = [0.0000, 0.0025, 0.0050, 0.0075, 0.0100, 0.0125, 0.0150, 0.0175, 0.0200, 0.0300, 0.0400, 0.0500, 0.1000, 0.1500, 0.2500, 0.3500, 0.4500, 0.5500, 0.6500, 0.7500, 0.8500, 0.9000, 0.9500, 0.9600, 0.9700, 0.9800, 0.9825, 0.9850, 0.9875, 0.9900, 0.9925, 0.9950, 0.9975, 1.0000]
volts = [2.0000, 2.0743, 2.1430, 2.2066, 2.2655, 2.3199, 2.3703, 2.4169, 2.4600, 2.6028, 2.7077, 2.7853, 2.9781, 3.1080, 3.1857, 3.2324, 3.2621, 3.2678, 3.2700, 3.2926, 3.3132, 3.3142, 3.3164, 3.3193, 3.3274, 3.3502, 3.3607, 3.3743, 3.3920, 3.4150, 3.4449, 3.4838, 3.5343, 3.6000]

# Ohmic resistance R0[soc][temp_k], ohms. Bilinear interpolation, clamped.
# provenance: order-of-magnitude placeholder — a few tens of milliohms, rising at
# low temperature and near the SOC extremes (TODO: fit).
[r0]
soc    = [0.0, 0.5, 1.0]
temp_k = [263.15, 298.15, 318.15]
ohms   = [[0.055, 0.022, 0.018],
          [0.048, 0.020, 0.016],
          [0.050, 0.021, 0.017]]

# Single RC (Thevenin) pair. tau = r_ohms * c_farad = 20 s.
# provenance: order-of-magnitude placeholder for the dominant polarization time
# constant of an LFP cell (TODO: fit from GITT/pulse data).
[[rc]]
r_ohms  = 0.010
c_farad = 2000.0

# --- Sections below are declared for later phases and ignored in Phase 0. ---

[thermal]
heat_capacity_j_per_k = 95.0   # provenance: ~m*cp for a 26650 (~85 g, mixed materials); placeholder
h_area_w_per_k        = 0.35   # provenance: natural-convection h*A placeholder for a bare cell

[aging]
cal_pre_exp                = 1.0e4    # provenance: placeholder — order-of-magnitude only, TODO fit
cal_ea_j_per_mol           = 5.0e4    # provenance: placeholder Arrhenius activation energy, TODO fit
cal_soc_stress             = [1.0, 1.0, 1.4]  # provenance: placeholder SOC stress at soc = 0.0/0.5/1.0
cyc_fade_per_ah            = 2.0e-5   # provenance: placeholder cycle fade per Ah throughput, TODO fit
cyc_dod_stress_exp         = 1.1      # provenance: placeholder DOD stress exponent
r_growth_per_capacity_loss = 1.5     # provenance: placeholder — resistance grows faster than capacity fades

[safety]
t_onset_k           = 423.15   # provenance: ~150 degC exothermic onset (LFP is relatively stable); placeholder
t_vent_k            = 453.15   # provenance: ~180 degC vent placeholder
runaway_energy_j    = 60.0e3   # provenance: placeholder per-cell exothermic budget, TODO fit
t_plating_min_k     = 273.15   # provenance: plating risk below 0 degC
plating_c_threshold = 0.5      # provenance: placeholder C-rate above which cold-charge plating risk flags
